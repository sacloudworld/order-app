name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Run build
        run: npm run build

      - name: Package Lambda artifact
        run: |
          cd dist
          zip -r ../lambda-artifact.zip .
          cd ..
          zip -r lambda-artifact.zip node_modules
          echo "Artifact size: $(du -sh lambda-artifact.zip | cut -f1)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda-artifact.zip

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}

      - name: Verify deployment
        run: |
          LAST_MODIFIED=$(aws lambda get-function-configuration \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --query 'LastModified' \
            --output text)
          echo "Lambda function last modified: $LAST_MODIFIED"
          echo "Deployment successful!"
