name: Deploy Order App to AWS

on:
  workflow_run:
    workflows: ["Build - Order App CI/CD Pipeline"]
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04
    environment: production
    # Only deploy when the build workflow completed successfully
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: order-app-${{ github.event.workflow_run.head_sha || github.sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifact
        run: echo "Artifact size: $(du -sh order-app.zip | cut -f1)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://order-app.zip

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}

      - name: Verify deployment
        run: |
          LAST_MODIFIED=$(aws lambda get-function-configuration \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --query 'LastModified' \
            --output text)
          echo "Lambda function last modified: $LAST_MODIFIED"
          echo "Deployment successful!"
